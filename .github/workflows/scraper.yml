name: Execucao do Scraper de Vagas

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout do Codigo
        uses: actions/checkout@v4

      - name: Configurar Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Executar Rotina de Coleta
        run: python src/main.py

      - name: Verificar Alteracoes nos Relatorios
        id: verify_diff
        run: |
          if git status --porcelain | grep -E "RESULT.md|public/vagas.json"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🔍 Novas vagas ou alterações detectadas!"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "💤 Nenhuma alteração nas vagas."
          fi

      - name: Enviar Notificacao para o Discord
        if: steps.verify_diff.outputs.changed == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -c "
          import json, requests, os
          from datetime import datetime, timezone, timedelta

          with open('src/companies.json', 'r', encoding='utf-8') as f:
              empresas = json.load(f)

          # Define o fuso horário UTC-3 (Horário de Brasília)
          fuso_sp = timezone(timedelta(hours=-3))
          data_atual = datetime.now(fuso_sp).strftime('%d/%m/%Y %H:%M')

          webhook_url = os.environ.get('DISCORD_WEBHOOK_URL')
          repo_url = 'https://github.com/HassanPls/EstagioCode/blob/main/RESULT.md'

          payload = {
              'embeds': [{
                  'title': '💼 Novas Vagas Detectadas no Monitor! 💼',
                  'description': f'O relatório foi atualizado em {data_atual} (Horário de Brasília) com novas oportunidades.\n\n[➔ Ver Vagas Novas no RESULT.md]({repo_url})',
                  'color': 2261794
              }]
          }
          requests.post(webhook_url, json=payload)
          "

      - name: Persistir Alteracoes no Repositorio
        if: steps.verify_diff.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RESULT.md public/vagas.json
          git commit -m "bot: atualizacao automatizada de vagas [skip ci]"
          git push
